services:
  simposio-integracar:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    restart: unless-stopped
    volumes:
      - sqlite_data:/code/data
    networks:
      - app-network
      - proxy

networks:
  app-network:
    driver: bridge

  proxy:
    external: true

volumes:
  sqlite_data:
