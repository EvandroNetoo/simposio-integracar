{% extends "base.html" %}

{% load static %}

{% block content %}

    <main id="main-content" class="gov-public-shell" tabindex="-1">
        <div class="card gov-auth-card">
            <div class="card-body">
                <div class="gov-brand-mark">
                    <img src="{% static 'img/logo.png' %}"
                         alt="Simpósio IntegraCAR"
                         class="h-20 w-auto"
                         hx-preserve="true"
                         id="password-reset-complete-logo">
                </div>

                <h1 class="mt-4 text-center">Senha atualizada</h1>
                <p class="gov-intro text-center">
                    Sua senha foi redefinida. Você já pode acessar sua conta.
                </p>

                <div class="divider divider-secondary"></div>

                <a href="{% url 'signin' %}" class="btn btn-primary btn-block gap-2">
                    <i class="ph ph-sign-in text-lg" aria-hidden="true"></i>
                    Fazer login
                </a>
            </div>
        </div>
    </main>

{% endblock content %}
