{% if next_url %}

    <input type="hidden" name="next" value="{{ next_url }}">

{% endif %}

<div class="gov-surface gov-surface-body space-y-6">

    {% if password_form.non_field_errors %}

        <div role="alert" class="alert alert-error alert-soft text-sm">
            <i class="ph ph-warning-circle text-lg"></i>
            <div>

                {% for error in password_form.non_field_errors %}
                    <p>{{ error }}</p>

                {% endfor %}
            </div>
        </div>

    {% endif %}

    <div class="border-b border-base-300 pb-4">
        <h2 class="text-lg font-semibold">Senha de acesso</h2>
        <p class="text-sm text-base-content/60">
            Use sua senha atual para definir uma nova senha.
        </p>
    </div>

    <div class="grid gap-4 lg:grid-cols-3">
        <c-django-form.field :field="password_form.old_password" />
        <c-django-form.field :field="password_form.new_password1" />
        <c-django-form.field :field="password_form.new_password2" />
    </div>

    <div class="flex border-t border-base-300 pt-4 sm:justify-end">
        <button type="submit" class="btn btn-secondary gap-2 w-full sm:w-auto">
            <i class="ph ph-lock-key text-lg"></i>
            Alterar senha
        </button>
    </div>
</div>
