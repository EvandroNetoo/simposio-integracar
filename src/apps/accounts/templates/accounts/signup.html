{% extends "base.html" %}

{% load static %}

{% block content %}

    <main id="main-content" class="gov-public-shell" tabindex="-1">
        <div class="card gov-auth-card">
            <div class="card-body">
                <div class="gov-brand-mark">
                    <img src="{% static 'img/logo.png' %}"
                         alt="Simpósio IntegraCAR"
                         class="h-20 w-auto"
                         hx-preserve="true"
                         id="signup-logo">
                </div>

                <h1 class="mt-4 text-center">Simpósio IntegraCAR</h1>
                <p class="gov-intro text-center">Crie sua conta para participar do evento</p>

                <div class="divider divider-secondary"></div>

                <c-htmx-form url="{% url 'signup' %}" class="space-y-4">
                    <div id="form">
                        <c-django-form :form="form" />
                    </div>

                    <div class="card-actions">
                        <button type="submit" class="btn btn-primary btn-block">Cadastrar</button>
                    </div>
                </c-htmx-form>

                <div class="divider divider-secondary"></div>

                <p class="text-center text-sm text-base-content/70">
                    Já tem uma conta?
                    <a href="{% url 'signin' %}"
                       class="text-primary font-semibold hover:underline">
                        Faça login
                    </a>
                </p>
            </div>
        </div>
    </main>

{% endblock content %}
