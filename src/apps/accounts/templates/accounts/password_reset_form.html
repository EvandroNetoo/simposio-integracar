{% extends "base.html" %}

{% load static %}

{% block content %}

    <main id="main-content" class="gov-public-shell" tabindex="-1">
        <div class="card gov-auth-card">
            <div class="card-body">
                <div class="gov-brand-mark">
                    <img src="{% static 'img/logo.png' %}"
                         alt="Simpósio IntegraCAR"
                         class="h-20 w-auto"
                         hx-preserve="true"
                         id="password-reset-logo">
                </div>

                <h1 class="mt-4 text-center">Recuperar senha</h1>
                <p class="gov-intro text-center">
                    Informe o e-mail cadastrado para receber o link de redefinição.
                </p>

                <div class="divider divider-secondary"></div>

                <form method="post" class="space-y-4">
                    {% csrf_token %}

                    <div id="form">
                        <c-django-form :form="form" />
                    </div>

                    <div class="card-actions">
                        <button type="submit" class="btn btn-primary btn-block gap-2">
                            <i class="ph ph-envelope-simple text-lg" aria-hidden="true"></i>
                            Enviar link de recuperação
                        </button>
                    </div>
                </form>

                <div class="divider divider-secondary"></div>

                <p class="text-center text-sm text-base-content/70">
                    Lembrou sua senha?
                    <a href="{% url 'signin' %}"
                       class="text-primary font-semibold hover:underline">
                        Faça login
                    </a>
                </p>
            </div>
        </div>
    </main>

{% endblock content %}
