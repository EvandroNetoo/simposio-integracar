{% extends "base.html" %}

{% load static %}

{% block content %}

    <div class="min-h-screen flex items-center justify-center px-4 py-10">
        <div class="card w-full max-w-md bg-base-100 shadow-xl border border-secondary">
            <div class="card-body">
                <div class="flex flex-col items-center gap-3">
                    <img src="{% static 'img/logo.png' %}"
                         alt="Simpósio IntegraCAR"
                         class="h-20 w-auto"
                         hx-preserve="true"
                         id="signup-logo">
                </div>
                <h1 class="mt-4 text-center text-2xl font-bold">Simpósio IntegraCAR</h1>
                <p class="text-center text-base-content/70">
                    Faça login para acessar sua conta e participar do evento
                </p>

                <div class="divider divider-secondary"></div>

                <c-htmx-form url="{% url 'signin' %}" class="space-y-4">
                    <div id="form">
                        <c-django-form :form="form" />
                    </div>

                    <div class="card-actions">
                        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
                    </div>
                </c-htmx-form>

                <div class="divider divider-secondary"></div>

                <p class="text-center text-sm text-base-content/70">
                    Não tem uma conta?
                    <a href="{% url 'signup' %}"
                       class="text-primary font-semibold hover:underline">
                        Crie uma conta
                    </a>
                </p>
            </div>
        </div>
    </div>

{% endblock content %}
