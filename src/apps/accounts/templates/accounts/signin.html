{% extends "base.html" %}

{% load static %}

{% block content %}

    <main id="main-content" class="gov-public-shell" tabindex="-1">
        <div class="card gov-auth-card">
            <div class="card-body">
                <div class="gov-brand-mark">
                    <img src="{% static 'img/logo.png' %}"
                         alt="Simpósio IntegraCAR"
                         class="h-20 w-auto"
                         hx-preserve="true"
                         id="signup-logo">
                </div>
                <h1 class="mt-4 text-center">Simpósio IntegraCAR</h1>
                <p class="gov-intro text-center">
                    Faça login para acessar sua conta e participar do evento
                </p>

                <div class="divider divider-secondary"></div>

                <c-htmx-form url="{% url 'signin' %}" class="space-y-4">
                    <div id="form">
                        <c-django-form :form="form" />
                    </div>
                    <div class="card-actions">
                        <button type="submit" class="btn btn-primary btn-block gap-2">
                            <i class="ph ph-sign-in text-lg" aria-hidden="true"></i>
                            Entrar
                        </button>
                    </div>
                </c-htmx-form>

                <div class="text-right">
                    <a href="{% url 'password_reset' %}" class="text-sm text-base-content/70 hover:underline">
                        Esqueci minha senha
                    </a>
                </div>

                <div class="divider divider-secondary"></div>

                <p class="text-center text-sm text-base-content/70">
                    Não tem uma conta?
                    <a href="{% url 'signup' %}"
                       class="text-primary font-semibold hover:underline">
                        Crie uma conta
                    </a>
                </p>
            </div>
        </div>
    </main>

{% endblock content %}
