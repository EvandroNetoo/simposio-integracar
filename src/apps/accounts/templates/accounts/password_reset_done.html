{% extends "base.html" %}

{% load static %}

{% block content %}

    <main id="main-content" class="gov-public-shell" tabindex="-1">
        <div class="card gov-auth-card">
            <div class="card-body">
                <div class="gov-brand-mark">
                    <img src="{% static 'img/logo.png' %}"
                         alt="Simpósio IntegraCAR"
                         class="h-20 w-auto"
                         hx-preserve="true"
                         id="password-reset-done-logo">
                </div>

                <h1 class="mt-4 text-center">Verifique seu e-mail</h1>
                <p class="gov-intro text-center">
                    Se houver uma conta cadastrada para o e-mail informado, enviaremos um link para criar uma nova senha.
                </p>

                <div class="divider divider-secondary"></div>

                <a href="{% url 'signin' %}" class="btn btn-primary btn-block">
                    Voltar ao login
                </a>
            </div>
        </div>
    </main>

{% endblock content %}
