{% extends 'platform_base.html' %}

{% block platform_content %}

    <section class="space-y-4">
        <div class="gov-page-header">
            <h1 class="text-2xl font-bold">Nova rodada de avaliação</h1>
            <a class="btn btn-ghost"
               href="{% url 'committee_dashboard' event_pk=event.pk %}">Voltar</a>
        </div>
        <form method="post" class="card bg-base-100 border border-base-300">
            <div class="card-body space-y-4">
                {% csrf_token %}
                <c-django-form />
                <button class="btn btn-primary" type="submit">Criar rodada</button>
            </div>
        </form>
    </section>

{% endblock platform_content %}
