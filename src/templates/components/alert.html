<c-vars type="info" dismissible="true" />

<div role="alert" class="alert 
    {% if type == 'success' %}alert-success{% endif %} 
    {% if type == 'error' %}alert-error{% endif %} 
    {% if type == 'warning' %}alert-warning{% endif %} 
    {% if type == 'info' %}alert-info{% endif %} alert-soft">

    {% if type == 'success' %}

        <i class="ph ph-check-circle text-xl shrink-0" aria-hidden="true"></i>
    {% elif type == 'error' %}

        <i class="ph ph-x-circle text-xl shrink-0" aria-hidden="true"></i>
    {% elif type == 'warning' %}

        <i class="ph ph-warning-circle text-xl shrink-0" aria-hidden="true"></i>

    {% else %}

        <i class="ph ph-info text-xl shrink-0" aria-hidden="true"></i>

    {% endif %}

    <span>{{ slot }}</span>
</div>
